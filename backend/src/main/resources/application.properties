# ============================================================================
# Application
# ============================================================================
quarkus.application.name=starter
quarkus.http.port=8080

# ============================================================================
# CORS (dev convenience: Angular dev server on 4200)
# ============================================================================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200,http://127.0.0.1:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# ============================================================================
# Datasource / Hibernate / Flyway
# ============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:inetum}
quarkus.datasource.password=${POSTGRES_PASSWORD:inetum}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:inetum}

# Keep a warm pool so the first request after idle doesn't pay connect cost.
# min=2 covers parallel /actions + /stats/engagement on initial page load.
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.initial-size=2
quarkus.datasource.jdbc.max-size=20

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

# ============================================================================
# JWT (smallrye-jwt). Keys generated at scaffold time, gitignored.
# ============================================================================
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://starter.inetum/issuer
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.native.resources.includes=publicKey.pem,privateKey.pem

# Token lifetime (seconds)
app.auth.token-ttl-seconds=3600

# ============================================================================
# File uploads (images for actions + proposals). FileService validates type
# (jpeg/png/webp/gif) and size (<= 5 MB) on top of these container limits.
# ============================================================================
app.uploads.dir=/app/uploads
# 25M = 20M video cap + multipart overhead room. FileService enforces
# stricter per-type caps (5M for images, 20M for videos).
quarkus.http.limits.max-body-size=25M
quarkus.http.body.handle-file-uploads=true

# ============================================================================
# LangChain4j (OpenAI-protocol-compatible providers). Keys via env, never
# committed. The OpenAI extension speaks the OpenAI HTTP protocol, which
# Groq mirrors exactly — so pointing OPENAI_API_BASE_URL at Groq lets the
# whole stack work with Groq's free tier (or anthropic-compatible
# proxies, etc.) without code changes.
# ============================================================================
quarkus.langchain4j.openai.base-url=${OPENAI_API_BASE_URL:https://api.openai.com/v1}
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:placeholder-set-OPENAI_API_KEY-env}
quarkus.langchain4j.openai.chat-model.model-name=${OPENAI_CHAT_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.timeout=30s
# IMPORTANT: never log prompts/completions in any environment.
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.log-responses=false

# ============================================================================
# Logging
# ============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.inetum.starter".level=DEBUG

# ============================================================================
# Profile: dev
# ============================================================================
# SQL logging is OFF by default in dev because, on Docker Desktop for
# Windows, every line of formatted multi-line SQL goes through the Docker
# log driver to the host filesystem and adds latency to every request. To
# turn it back on temporarily while debugging, just flip the line below
# and restart the backend.
%dev.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.log.category."com.inetum.starter".level=DEBUG

# Disable live-reload's per-request "did any source change?" scan. With a
# Windows host bind mount, that scan walks the entire source tree through
# the slow 9P bridge and adds ~1-2 SECONDS per request. We don't need it
# because the workflow is "edit → docker compose ... restart backend".
%dev.quarkus.live-reload.enabled=false

# ============================================================================
# Profile: test (H2 not used; Testcontainers spins up postgres on demand)
# ============================================================================
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine
%test.quarkus.flyway.migrate-at-start=true

# ============================================================================
# Profile: prod
# ============================================================================
%prod.quarkus.log.console.json=false
